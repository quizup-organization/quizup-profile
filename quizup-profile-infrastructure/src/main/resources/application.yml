server:
  port: 8084

spring:
  application:
    name: quizup-profile

  datasource:
    url: jdbc:postgresql://localhost:5432/quizup_profile
    username: postgres
    password: postgres

  flyway:
    locations: classpath:db/migration/profile

axon:
  distributed:
    enabled: true

microservice:
  swagger:
    description: QuizUp Profile Module - Provides user profile management, including user information, preferences, and activity history.
  websocket:
    enabled: false

app:
  seed-data:
    enabled: true

logging:
  level:
    io.github.quizup: DEBUG
