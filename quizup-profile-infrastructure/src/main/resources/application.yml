spring:
  application:
    name: quizup-profile
  profiles:
    default: local

  flyway:
    locations: classpath:db/migration/profile

axon:
  distributed:
    enabled: true

microservice:
  swagger:
    description: QuizUp Profile Module - Provides user profile management, including user information, preferences, and activity history.
  websocket:
    enabled: false

app:
  seed-data:
    enabled: false

logging:
  level:
    io.github.quizup: ${QUIZUP_LOG_LEVEL:INFO}
